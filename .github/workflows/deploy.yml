name: Deploy to Kinsta Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf node_modules

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.KINSTA_HOST }}
          username: ${{ secrets.KINSTA_USERNAME }}
          key: ${{ secrets.KINSTA_SSH_PRIVATE_KEY }}
          port: ${{ secrets.KINSTA_PORT }}
          source: "."
          target: "/www/beluxeproperties_804/public/wp-content/themes/beluxe-theme"
          rm: true

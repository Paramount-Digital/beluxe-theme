name: Deploy to Kinsta Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment (remove unnecessary files)
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf node_modules

      - name: Upload theme to Kinsta via SSH (rsync)
        uses: appleboy/rsync-action@v0.1.0
        with:
          host: ${{ secrets.KINSTA_HOST }}
          username: ${{ secrets.KINSTA_USERNAME }}
          key: ${{ secrets.KINSTA_SSH_PRIVATE_KEY }}
          port: ${{ secrets.KINSTA_PORT }}
          source: "."
          target: "/www/beluxeproperties_804/public/wp-content/themes/beluxe-theme"
          exclude: ".git,.github,node_modules,.DS_Store"
          delete: true

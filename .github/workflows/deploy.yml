name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Kinsta staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KINSTA_HOST }}
          port: ${{ secrets.KINSTA_PORT }}
          username: ${{ secrets.KINSTA_USERNAME }}
          key: ${{ secrets.KINSTA_SSH_PRIVATE_KEY }}
          script: |
            cd /www/beluxeproperties_804/public/wp-content/themes/beluxe-theme
            git pull origin main

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
    ports:
      - "8080:80"
    volumes:
      # Persist the full WordPress installation
      - wp_html:/var/www/html
      # Mount the theme directory for live editing (overrides the path inside wp_html)
      - ./:/var/www/html/wp-content/themes/beluxe-theme
      # Apache config to enable mod_rewrite for pretty permalinks
      - ./docker/apache.conf:/etc/apache2/conf-available/wordpress.conf
    command: >
      bash -c "a2enconf wordpress && a2enmod rewrite && apache2-foreground"

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 512M
    ports:
      - "8889:80"

  wpcli:
    image: wordpress:cli
    depends_on:
      - db
      - wordpress
    env_file: .env
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
    volumes:
      # Same WordPress volume as the wordpress service
      - wp_html:/var/www/html
      # Same theme mount for consistency
      - ./:/var/www/html/wp-content/themes/beluxe-theme
    entrypoint: ["sh", "-c", "sleep infinity"]
    profiles:
      - tools

volumes:
  db_data:
  wp_html:
